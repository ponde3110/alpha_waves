<script>

/* ===== iOS スクロール＆ズーム防止 ===== */
document.addEventListener("touchmove", e => {
  e.preventDefault();
}, { passive: false });

document.addEventListener("gesturestart", e => {
  e.preventDefault();
}, { passive: false });

/* ===== 縦固定 ===== */
function lockPortrait() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("portrait").catch(() => {});
  }
}


// ユーザー操作後でないと効かない端末があるため
document.addEventListener("click", lockPortrait, { once: true });
document.addEventListener("touchstart", lockPortrait, { once: true });


/* ===== Audio ===== */
// iOS requires AudioContext to be created/resumed inside a user gesture
let audioCtx = null;
let audioStarted = false;
let bgGain = null;

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgGain = audioCtx.createGain();
    bgGain.gain.value = muted ? 0 : 0.04;
    bgGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume().catch(() => {});
  }
}

const chords = [
  [220,330,440],
  [247,370,494],
  [262,392,523],
  [294,440,587]
];
let chordIndex = 0, chordTimeout;
let muted = false;
try { muted = localStorage.getItem("muted") === "true"; } catch(e) {}

let sideHitFlash = 0;
let explodeColorPhase = 0;
let nextLifeScore = 50000;

let sideHitFlashLeft = 0;
let sideHitFlashRight = 0;

let hatapieFlash = 0;   // ★ はたピー接触時の色変化用

let isLandscape = false; // 回転時の警告用
let calibrating = false; // ニュートラル設定中は回転判定を止める変数
let gameOverTimeout = null; // 回転時の時計を止める

const muteBtn = document.getElementById("muteBtn");

muteBtn.onclick = () => {
  muted = !muted;
  try { localStorage.setItem("muted", muted); } catch(e) {}
  if (bgGain) bgGain.gain.value = muted ? 0 : 0.04;
  muteBtn.textContent = muted ? "🔇" : "🔊";
};
muteBtn.addEventListener("touchend", e => {
  e.preventDefault();
  muteBtn.onclick();
}, { passive: false });

muteBtn.textContent = muted ? "🔇" : "🔊";


function playChord() {
  if (isGameOver) return;
  if (!audioCtx) return;

  const freqs = [220, 330]; // 優しい2音

  freqs.forEach(f => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    osc.type = "triangle";
    osc.frequency.value = f;

    g.gain.value = muted ? 0 : 0.12;

    osc.connect(g);
    g.connect(audioCtx.destination);

    osc.start();

    g.gain.exponentialRampToValueAtTime(
      0.0001,
      audioCtx.currentTime + 2.5
    );

    osc.stop(audioCtx.currentTime + 2.5);
  });

  chordTimeout = setTimeout(playChord, 5000);
}


function hitSound() {
  if (muted) return;
  if (!audioCtx) return;

  const now = audioCtx.currentTime;

  /* ===== ノイズ（衝突感） ===== */
  const bufferSize = audioCtx.sampleRate * 0.12;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = "highpass";      // ★ 低音カット
  noiseFilter.frequency.value = 600;

  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(0.35, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);

  /* ===== ピッという中高音 ===== */
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();

  osc.type = "square";               // ★ 目立つ
  osc.frequency.setValueAtTime(1600, now);
  osc.frequency.exponentialRampToValueAtTime(600, now + 0.08);

  oscGain.gain.setValueAtTime(0.25, now);
  oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

  osc.connect(oscGain);
  oscGain.connect(audioCtx.destination);

  /* ===== 再生 ===== */
  noise.start(now);
  noise.stop(now + 0.2);

  osc.start(now);
  osc.stop(now + 0.12);
}


function bounceSound(){
  if (muted) return;
  if (!audioCtx) return;

  const ctx = audioCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";          // 柔らかい音
  osc.frequency.value = 880; // 高め（軽い反射感）

  gain.gain.value = 0.15;
  gain.gain.exponentialRampToValueAtTime(
    0.001,
    ctx.currentTime + 0.12
  );

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.12);
}



function destroySound() {
  if (muted) return;
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // ノイズ生成
  const bufferSize = audioCtx.sampleRate * 2.5;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  // フィルター（徐々に低く沈む）
  const filter = audioCtx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.setValueAtTime(1200, now);
  filter.frequency.exponentialRampToValueAtTime(120, now + 2.5);

  // 音量制御
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.35, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  noise.start(now);
  noise.stop(now + 3);
}


/* ===== Canvas ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  // iOS Safari では window.innerHeight がアドレスバー含みになる場合があるため
  // visualViewport を優先して使用する
  const w = (window.visualViewport ? window.visualViewport.width  : window.innerWidth);
  const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  canvas.width  = w;
  canvas.height = h;
}

resize();
addEventListener("resize", resize);
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", resize);
}

const W = () => canvas.width;
const H = () => canvas.height;
const scoreLabel = document.getElementById("score");
const hiLabel = document.getElementById("hiscore");
const gameoverLabel = document.getElementById("gameover");
const livesLabel = document.getElementById("lives");

const startMessage = document.getElementById("startMessage");  // スタート時に表示 → 自動で消す
const startBtn = document.getElementById("startBtn");
const ruleBtn  = document.getElementById("ruleBtn");



let offset = 0, score = 0;
let hiScore = 0;
try { hiScore = Number(localStorage.getItem("hiScore") || 0); } catch(e) {}
let lives = 3, invincible = 0, isGameOver = false, gameStarted = false, scoreStarted = false;
const roadWidth = 150;
let ballDestroyed = false, ballScale = 1;
let ballX=0, ballY=H()*0.6, ballVX=0, ballVY=0, inputX=0, inputY=0;
const BALL_R = 14;
const keys = {};

let neutralSamples = [];
let neutralReady = false;

// ===== スマホ傾き操作 =====
const isIPad =
  /iPad/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

let tiltInputX = 0, tiltInputY = 0;

let baseGamma = null;
let baseBeta = null;


function handleOrientation(e) {

  if (e.beta == null || e.gamma == null) return;

  /* =========================================
     ① ゲーム開始前 → ニュートラル用サンプリング
     ========================================= */
  if (!gameStarted) {

    neutralSamples.push({
      beta: e.beta,
      gamma: e.gamma
    });

    // 最大数を超えたら古いものを削除
    if (neutralSamples.length > NEUTAL_SAMPLE_MAX) {
      neutralSamples.shift();
    }

    return;   // ゲーム開始前はここで終了
  }

  /* =========================================
     ② ゲーム中 → 基準との差分で操作
     ========================================= */

  if (baseGamma === null || baseBeta === null) return;

  let rawBeta  = e.beta  - baseBeta;
  let rawGamma = e.gamma - baseGamma;

  /* ===== 画面回転補正 ===== */
  const angle =
    (screen.orientation && screen.orientation.angle != null)
      ? screen.orientation.angle
      : (typeof window.orientation === "number" ? window.orientation : 0);

  let x, y;

  if (isIPad) {
    // iPad は deviceorientation の beta/gamma が
    // 通常スマホと比べて 90度ずれて報告されるため補正する
    // 縦持ち(0): 右傾き=gamma正 → x正、前傾き=beta正 → y正
    // 横持ち(90): landscape-left → beta/gamma を入れ替えて補正
    switch (angle) {
      case 90:   // ホームボタンが右（landscape-left）
        x =  rawGamma;
        y =  rawBeta;
        break;
      case 270:
      case -90:  // ホームボタンが左（landscape-right）
        x = -rawGamma;
        y = -rawBeta;
        break;
      case 180:  // 上下逆さ縦持ち
        x = -rawGamma;
        y =  rawBeta;
        break;
      default:   // 0: 通常縦持ち
        x =  rawGamma;
        y = -rawBeta;
        break;
    }
  } else {
    x = rawGamma;
    y = rawBeta;

    switch (angle) {
      case 90:
        [x, y] = [y, -x];
        break;
      case 180:
        x = -x;
        y = -y;
        break;
      case 270:
      case -90:
        [x, y] = [-y, x];
        break;
    }
  }

  /* ===== 感度 ===== */
  const sensitivity = 0.04;

  tiltInputX = x * sensitivity;
  tiltInputY = y * sensitivity;
}

/* ===== 道 ===== */
function roadCenter(y) {
  return W()/2
    + Math.sin((y + offset) * 0.01) * 80
    + Math.sin((y + offset) * 0.03) * 30;
}

function drawRoad() {
  const leftEdge = [];
  const rightEdge = [];

  /* ===== 道の中心と幅 ===== */
  for (let y = 0; y <= H(); y += 2) {
    const cx = roadCenter(y);
    const t = y / H();
    const perspective = 0.1 + t * 1.0;
    const w = roadWidth * perspective;

    leftEdge.push({ x: cx - w / 2, y });
    rightEdge.push({ x: cx + w / 2, y });
  }

  /* ===== 路面 ===== */
  for (let i = 0; i < leftEdge.length; i++) {
    const y = leftEdge[i].y;
    const lx = leftEdge[i].x;
    const rx = rightEdge[i].x;

    const roadGrad = ctx.createLinearGradient(lx, 0, rx, 0);
    roadGrad.addColorStop(0, "#2a7a6d");
    roadGrad.addColorStop(0.35, "#145046");
    roadGrad.addColorStop(0.5, "#0a2a26");
    roadGrad.addColorStop(0.65, "#145046");
    roadGrad.addColorStop(1, "#2a7a6d");

    ctx.fillStyle = roadGrad;
    ctx.fillRect(lx, y, rx - lx, 2);

    // 遠近グラデーション（縦方向）
    const depthGrad = ctx.createLinearGradient(0, 0, 0, H());
    depthGrad.addColorStop(0, "rgba(0,0,0,0.65)");
    depthGrad.addColorStop(0.45, "rgba(0,0,0,0.25)");
    depthGrad.addColorStop(1, "rgba(255,255,255,0.12)");
    ctx.fillStyle = depthGrad;
    ctx.fillRect(lx, y, rx - lx, 2);
  }

  /* ===== 道の縁（ヒット時は色だけ変える） ===== */
  for (let i = 0; i < leftEdge.length; i++) {
    const t = leftEdge[i].y / H();
    const perspective = 0.1 + t * 1.0;
    const alpha = 0.3 + 0.7 * perspective;

    /* --- 左縁 --- */
    ctx.lineWidth = 3;
    ctx.strokeStyle = sideHitFlashLeft > 0
      ? "rgba(154,135,44,0.45)"        // ヒット時（金色）
      : `rgba(40,120,100,${alpha})`;  // 通常

    ctx.beginPath();
    ctx.moveTo(leftEdge[i].x, leftEdge[i].y);
    if (i < leftEdge.length - 1) {
      ctx.lineTo(leftEdge[i + 1].x, leftEdge[i + 1].y);
    }
    ctx.stroke();

    /* --- 右縁 --- */
    ctx.lineWidth = 3;
    ctx.strokeStyle = sideHitFlashRight > 0
      ? "rgba(154,135,44,0.45)"        // ヒット時（金色）
      : `rgba(40,120,100,${alpha})`;  // 通常

    ctx.beginPath();
    ctx.moveTo(rightEdge[i].x, rightEdge[i].y);
    if (i < rightEdge.length - 1) {
      ctx.lineTo(rightEdge[i + 1].x, rightEdge[i + 1].y);
    }
    ctx.stroke();
  }

  /* ===== フラッシュ減算 ===== */
  if (sideHitFlashLeft > 0) sideHitFlashLeft--;
  if (sideHitFlashRight > 0) sideHitFlashRight--;

  /* ===== センターライン ===== */
  ctx.strokeStyle = "rgba(140,220,180,0.35)";
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  for (let i = 0; i < leftEdge.length; i++) {
    const cx = (leftEdge[i].x + rightEdge[i].x) / 2;
    if (i === 0) ctx.moveTo(cx, leftEdge[i].y);
    else ctx.lineTo(cx, leftEdge[i].y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  /* ===== 道専用フォグ ===== */
  ctx.save();
  ctx.beginPath();
  for (let i = 0; i < leftEdge.length; i++) {
    if (i === 0) ctx.moveTo(leftEdge[i].x, leftEdge[i].y);
    else ctx.lineTo(leftEdge[i].x, leftEdge[i].y);
  }
  for (let i = rightEdge.length - 1; i >= 0; i--) {
    ctx.lineTo(rightEdge[i].x, rightEdge[i].y);
  }
  ctx.closePath();
  ctx.clip();

  const fog = ctx.createLinearGradient(0, 0, 0, H() * 0.1);
  fog.addColorStop(0, "rgba(20,0,40,1)");
  fog.addColorStop(1, "rgba(20,0,40,0)");
  ctx.fillStyle = fog;
  ctx.fillRect(0, 0, W(), H() * 0.1);
  ctx.restore();

  /* ===== テル（上から落ちる物体） ===== */
  holes.forEach(o => {
    if (o.y < 0 || o.y > H()) return;

    const t = o.y / H();
    const perspective = 0.1 + t * 1.0;

    const cx = roadCenter(o.y) + o.xOffset;
    const cy = o.y + 6 * perspective;

    const r = o.r * perspective;
    const h = o.h * perspective;

    ctx.fillStyle = `rgba(0,0,0,${0.35 * perspective})`;
    ctx.beginPath();
    ctx.ellipse(cx, cy + h, r * 1.1, r * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();

    const topGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, r);
    topGrad.addColorStop(0, "#442060");
    topGrad.addColorStop(1, "#140018");
    ctx.fillStyle = topGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    const sideGrad = ctx.createLinearGradient(cx, cy, cx, cy + h);
    sideGrad.addColorStop(0, "rgba(80,0,120,0.8)");
    sideGrad.addColorStop(1, "rgba(0,0,0,0.95)");
    ctx.fillStyle = sideGrad;
    ctx.beginPath();
    ctx.ellipse(cx, cy + h, r, r * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = `rgba(190,130,255,${0.3 + 0.4 * perspective})`;
    ctx.lineWidth = 2 * perspective;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  });

  /* ===== はたピー ===== */
  hatapies.forEach((o, index) => {
    if (o.y < 0 || o.y > H()) return;

    const t = o.y / H();
    const p = 0.1 + t * 1.0;

    const cx = roadCenter(o.y) + o.xOffset;
    const floatY = o.y + Math.sin(Date.now()/500 + index) * 6;

    const alpha = 0.5 + 0.5 * Math.sin(Date.now()/400 + index);
    const r = o.r * p;

    const glow = ctx.createRadialGradient(cx, floatY, 1, cx, floatY, r);
    glow.addColorStop(0, `rgba(255,240,245,${alpha})`);
    glow.addColorStop(0.3, `rgba(255,182,193,${alpha})`);
    glow.addColorStop(0.6, `rgba(255,105,180,${alpha})`);
    glow.addColorStop(0.85, `rgba(219,112,147,${alpha * 0.8})`);
    glow.addColorStop(1, `rgba(199,21,133,0)`);

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, floatY, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = `rgba(255,105,180,${0.5 * p * alpha})`;
    ctx.lineWidth = 1.5 * p;
    ctx.beginPath();
    ctx.arc(cx, floatY, r, 0, Math.PI * 2);
    ctx.stroke();
  });
}

  if (!gameStarted) return;
  const t = e.touches[0];
  touchCurrentX = t.clientX;
  touchCurrentY = t.clientY;
  const dx = touchCurrentX - touchStartX;
  const dy = touchCurrentY - touchStartY;
  const sensitivity = 0.012;
  touchInputX = Math.max(-2, Math.min(2, dx * sensitivity));
  touchInputY = Math.max(-2, Math.min(2, dy * sensitivity));
}, { passive: true });

  touchStartX = null;
  touchStartY = null;

  const objR = o.r * pObj;

  const tBall = ballY / H();
  const pBall = 0.1 + tBall * 1.0;

  const ballCX = roadCenter(ballY) + ballX;
  const ballCY = ballY;
  const ballR  = BALL_R * pBall;

  const dx = ballCX - cx;
  const dy = ballCY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < ballR + objR * 0.85) {
    // ===== 接触時の処理 =====
    hatapieFlash = 120;   // ★ 1秒だけ色を濃く
    if (lives < maxLives) {

        showLifeUpMessage("Life Up!");
        lifeUpMessage.style.color = "#ff8c1a"; // ハート色
      }
    }

  // 接触済みはたピーを削除
  hatapies.splice(i, 1);
}

/* ===== STARTボタン（全デバイス対応版） ===== */
async function onStartBtn() {

  /* ===== AudioContext 初期化（iOS: ユーザー操作内で必須）===== */
  ensureAudioCtx();

  /* ===== ジャイロ許可取得（iOS13+ 対策）===== */
  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission !== "granted") return;
    }
  } catch (err) {
    console.error(err);
  }

  /* ===== ニュートラル再取得開始 ===== */
  neutralSamples = [];
  neutralReady = false;

  // 約0.5秒間サンプリング
  const CALIBRATION_TIME = 500;

  setTimeout(async () => {

    /* ===== 平均値でニュートラル確定 ===== */
    if (neutralSamples.length > 5) {

      let sumBeta = 0;
      let sumGamma = 0;

      neutralSamples.forEach(s => {
        sumBeta  += s.beta;
        sumGamma += s.gamma;
      });

      baseBeta  = sumBeta  / neutralSamples.length;
      baseGamma = sumGamma / neutralSamples.length;

    } else {
      // センサーデータがまだ少ない場合
      baseBeta  = 0;
      baseGamma = 0;
    }

    /* ===== UI非表示 ===== */
    ruleBtn.style.display = "none";
    startBtn.style.display = "none";
    title.style.display = "none";
    author.style.display = "none";

    /* ===== ゲーム初期化 ===== */
    invincible = 0;
    sideHitFlash = 0;
    sideHitFlashLeft = 0;
    sideHitFlashRight = 0;
    hatapieFlash = 0;

    gameStarted = true;
    scoreStarted = true;
    isGameOver = false;

    lives = 3;

    score = 0;
    nextLifeScore = 50000;

    ballX = 0;

    ballVX = 0;

  }, CALIBRATION_TIME);
}

function lifeUpSound() {
  if (muted) return;
  if (!audioCtx) return;

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  // 音色
  osc1.type = "sine";
  osc2.type = "triangle";

  // 周波数（チャリン感）
  osc1.frequency.setValueAtTime(1200, audioCtx.currentTime);
  osc2.frequency.setValueAtTime(1800, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime + 0.35
  );

  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);

  osc1.start();
  osc2.start();

  osc1.stop(audioCtx.currentTime + 0.35);
  osc2.stop(audioCtx.currentTime + 0.35);
}

function ballPerspectiveRadius(y) {

  return BALL_R * t * ballScale;

// ===== テルの消滅音 =====
function tellDestroySound() {
  if (muted) return;
  if (!audioCtx) return;

  const now = audioCtx.currentTime;

  // 声の息成分
  const bufferSize = audioCtx.sampleRate * 0.09;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  // フォルマント（人の声帯域）
  const f1 = audioCtx.createBiquadFilter();
  f1.type = "bandpass";
  f1.frequency.value = 700;   // テ

  const f2 = audioCtx.createBiquadFilter();
  f2.type = "bandpass";
  f2.frequency.value = 1800; // ル

  const f3 = audioCtx.createBiquadFilter();
  f3.type = "bandpass";
  f3.frequency.value = 2600;  // 子音輪郭

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.25, now);
  gain.gain.linearRampToValueAtTime(0.05, now + 0.04);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.16);

  noise.connect(f1);
  f1.connect(f2);
  f2.connect(f3);
  f3.connect(gain);
  gain.connect(audioCtx.destination);

  noise.start(now);
  noise.stop(now + 0.16);

  // 声の芯（喉）
  const osc = audioCtx.createOscillator();
  const og = audioCtx.createGain();

  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(210, now);
  osc.frequency.exponentialRampToValueAtTime(160, now + 0.12);

  og.gain.setValueAtTime(0.07, now);
  og.gain.exponentialRampToValueAtTime(0.001, now + 0.16);

  osc.connect(og);
  og.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + 0.16);
}

// ★ はたピー取得音（ピコピコ系）作成
function hatapiesSound() {
  if (muted) return;
  if (!audioCtx) return;
  const ctx = audioCtx;
  const now = ctx.currentTime;

  // 「は」「た」「ぴー」の順に周波数を変えて再生
  const notes = [
    { freq: 660, duration: 0.08 },  // は（短め低音）
    { freq: 880, duration: 0.08 },  // た（短め中音）
    { freq: 1320, duration: 0.18 }  // ぴー（少し長め高音）
  ];

  let currentTime = now;

  notes.forEach(n => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";           // 可愛い音
    osc.frequency.value = n.freq;

    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(currentTime);
    osc.stop(currentTime + n.duration);

    // 徐々に音をフェードアウト
    gain.gain.setValueAtTime(0.15, currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, currentTime + n.duration);

    currentTime += n.duration;
  });
}

function drawRuleBall() {
  const c = document.getElementById("ruleBall");
  const ctx = c.getContext("2d");

  const cx = 40, cy = 40, r = 22;
  const perspective = 1;

  const g = ctx.createRadialGradient(
    cx - 5 * perspective,
    cy - 5 * perspective,
    2 * perspective,
    cx,
    cy,
    r * 1.1
  );
  g.addColorStop(0.0, "#e6d98a");
  g.addColorStop(0.25, "#9a872c");
  g.addColorStop(0.55, "#6f6220");
  g.addColorStop(0.8, "#a89332");
  g.addColorStop(1.0, "#ff8c1a");

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawRuleTell() {
  const c = document.getElementById("ruleTell");
  const ctx = c.getContext("2d");

  const cx = 40, cy = 38, r = 18, h = 14;

  // 影
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.beginPath();
  ctx.ellipse(cx, cy + h + 4, r * 1.1, r * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();

  // 上面
  const topGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, r);
  topGrad.addColorStop(0, "#442060");
  topGrad.addColorStop(1, "#140018");

  ctx.fillStyle = topGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // 側面
  const sideGrad = ctx.createLinearGradient(cx, cy, cx, cy + h);
  sideGrad.addColorStop(0, "rgba(80,0,120,0.8)");
  sideGrad.addColorStop(1, "rgba(0,0,0,0.95)");

  ctx.fillStyle = sideGrad;
  ctx.beginPath();
  ctx.ellipse(cx, cy + h, r, r * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawRuleHatapie() {
  const c = document.getElementById("ruleHatapie");
  const ctx = c.getContext("2d");

  const cx = 40, cy = 40, r = 20;
  const alpha = 0.85;

  const glow = ctx.createRadialGradient(cx, cy, 1, cx, cy, r);
  glow.addColorStop(0, `rgba(255,240,245,${alpha})`);
  glow.addColorStop(0.3, `rgba(255,182,193,${alpha})`);
  glow.addColorStop(0.6, `rgba(255,105,180,${alpha})`);
  glow.addColorStop(0.85, `rgba(219,112,147,${alpha * 0.8})`);
  glow.addColorStop(1, `rgba(199,21,133,0)`);

  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = `rgba(255,105,180,${0.6})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
}
